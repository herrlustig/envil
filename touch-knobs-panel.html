<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:;"/>
<style>
/* ── Reset ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: var(--vscode-editor-background, #1e1e1e); font-family: var(--vscode-font-family, 'Segoe UI', sans-serif); color: var(--vscode-editor-foreground, #ccc); user-select: none; -webkit-user-select: none; touch-action: none; display: flex; flex-direction: column; }

/* ── Toolbar ──────────────────────────────────────────────────────────── */
#toolbar {
    flex-shrink: 0; height: 32px; z-index: 100;
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
    background: var(--vscode-titleBar-activeBackground, #333);
    border-bottom: 1px solid var(--vscode-panel-border, #444);
    font-size: 12px;
}
#toolbar button {
    background: var(--vscode-button-background, #0e639c);
    color: var(--vscode-button-foreground, #fff);
    border: none; border-radius: 3px; padding: 3px 10px; cursor: pointer;
    font-size: 11px; white-space: nowrap;
}
#toolbar button:hover { opacity: 0.85; }
#toolbar button.danger {
    background: var(--vscode-errorForeground, #c44);
}
#toolbar button.mp-active {
    background: #0a4; color: #fff;
}
#toolbar .spacer { flex: 1; }
#toolbar .status { font-size: 11px; opacity: 0.6; }

/* ── Sequencer section ────────────────────────────────────────────────── */
#seq-section {
    flex-shrink: 0; overflow-y: auto; overflow-x: auto;
    min-height: 220px;
    border-bottom: 1px solid var(--vscode-panel-border, #444);
}
#seq-header {
    display: none; align-items: center; gap: 6px; padding: 4px 8px;
    background: var(--vscode-titleBar-activeBackground, #333);
    cursor: pointer; font-size: 11px;
}
#seq-header:hover { background: #3a3a3a; }
#seq-header .arrow { font-size: 10px; width: 12px; text-align: center; }
#seq-transport {
    display: flex; align-items: center; gap: 6px; padding: 2px 8px 4px;
    background: var(--vscode-titleBar-activeBackground, #333);
    font-size: 11px;
}
#seq-transport .seq-transport-spacer { flex: 1; }
#seq-transport button {
    background: var(--vscode-button-background, #0e639c);
    color: var(--vscode-button-foreground, #fff);
    border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer;
    font-size: 11px;
}
#seq-transport button:hover { opacity: 0.85; }
#seq-transport button.active { background: #0a4; }
#seq-transport .seq-tap-btn {
    min-width: 68px;
    min-height: 28px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(180deg, #d9852f, #b55a14);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset;
}
#seq-transport .seq-tap-btn.syncing {
    background: linear-gradient(180deg, #0e7ac0, #0a5d91);
}
#seq-transport .seq-tap-btn.flash {
    transform: translateY(1px) scale(0.98);
    filter: brightness(1.18);
}
#seq-transport input[type=number] {
    width: 54px; background: var(--vscode-input-background, #3c3c3c);
    color: var(--vscode-input-foreground, #ccc);
    border: 1px solid var(--vscode-input-border, #555);
    border-radius: 3px; padding: 2px 4px; font-size: 11px;
    text-align: center;
}
#seq-grid {
    padding: 4px 8px 8px;
    width: max-content;
    margin: 0 auto;
}
.macro-grid {
    padding: 6px 8px 2px;
    border-bottom: 1px solid var(--vscode-panel-border, #444);
}
.macro-row {
    display: flex; align-items: center; gap: 4px; margin-bottom: 6px;
    position: relative; margin-top: 10px;
}
.macro-row .macro-label {
    position: absolute; top: -10px; left: 0; z-index: 2;
    font-size: 8px; padding: 0px 3px; border-radius: 2px;
    background: rgba(0,0,0,0.45);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 90px; cursor: pointer; opacity: 0.7; line-height: 1.4;
}
.macro-row .macro-label:hover { opacity: 1; }
.macro-row .macro-btn-stack {
    display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
}
.macro-row .macro-play-btn {
    width: 22px; height: 16px; font-size: 9px; line-height: 14px;
    text-align: center; cursor: pointer;
    border: 1px solid #555; border-radius: 3px;
    background: #2a2a2a; color: var(--vscode-editor-foreground, #ccc);
}
.macro-row .macro-play-btn:hover { border-color: #aaa; }
.macro-row .macro-play-btn.playing { background: #0a4; color: #fff; border-color: #0a4; }
.macro-row .macro-loop-btn {
    width: 22px; height: 16px; font-size: 9px; line-height: 14px;
    text-align: center; cursor: pointer;
    border: 1px solid #555; border-radius: 3px;
    background: #2a2a2a; color: var(--vscode-editor-foreground, #ccc);
}
.macro-row .macro-loop-btn:hover { border-color: #aaa; }
.macro-row .macro-loop-btn.active { background: #0e639c; color: #fff; border-color: #0e639c; }
.macro-row .macro-dur-wrap {
    position: relative; flex-shrink: 0; width: 36px; align-self: stretch;
}
.macro-row .macro-duration {
    width: 100%; height: 100%; box-sizing: border-box;
    background: rgba(40, 40, 40, 0.6);
    color: var(--vscode-input-foreground, #ccc);
    border: 1px solid var(--vscode-input-border, #555);
    border-radius: 6px; padding: 14px 2px 4px 2px; font-size: 13px; font-weight: 600;
    text-align: center; touch-action: none; cursor: ns-resize;
    -moz-appearance: textfield;
}
.macro-row .macro-duration::-webkit-inner-spin-button,
.macro-row .macro-duration::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.macro-row .macro-unit {
    position: absolute; top: 2px; left: 0; right: 0;
    font-size: 8px; opacity: 0.5; text-align: center;
    pointer-events: none; line-height: 1;
}
.macro-row .macro-canvas-wrap {
    flex: 1; min-width: 120px; min-height: 0; height: 68px; position: relative;
    border: 1px solid #444; border-radius: 4px; overflow: hidden;
    background: linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    display: flex; flex-direction: column;
}
.macro-row .macro-canvas {
    display: block; width: 100%; height: 0; min-height: 0; flex: 1 1 auto;
    cursor: crosshair;
}
.macro-row .macro-seekbar {
    position: relative; height: 16px; flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.18));
    cursor: ew-resize; touch-action: none;
}
.macro-row .macro-seekfill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(to right, rgba(255,255,255,0.08), rgba(255,255,255,0.16));
    pointer-events: none;
}
.macro-row .macro-seekhead {
    position: absolute; top: 1px; bottom: 1px; width: 10px;
    margin-left: -5px; border-radius: 8px;
    background: #fff3a0; box-shadow: 0 0 6px rgba(255,245,160,0.45);
    pointer-events: none;
}
.macro-row .macro-seeklabel {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: 9px; opacity: 0.55; letter-spacing: 0.04em;
    pointer-events: none;
}
.macro-row .macro-remove {
    width: 22px; height: 16px; font-size: 9px; line-height: 14px;
    text-align: center; cursor: pointer; opacity: 0.3;
    border: 1px solid transparent; border-radius: 3px;
    background: none; color: var(--vscode-editor-foreground, #ccc);
    padding: 0;
}
.macro-row .macro-remove:hover { opacity: 1; color: #f44; }
.macro-row .macro-remove.confirm { opacity: 1; color: #fff; background: #a00; border-color: #f44; }
.seq-row {
    display: flex; align-items: center; gap: 2px; margin-bottom: 3px;
    position: relative; margin-top: 10px;
}
.seq-row .seq-label {
    position: absolute; top: -10px; left: 0; z-index: 2;
    font-size: 8px; padding: 0px 3px; border-radius: 2px;
    background: rgba(0,0,0,0.45);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 90px; cursor: pointer; opacity: 0.7; line-height: 1.4;
}
.seq-row .seq-label:hover { opacity: 1; }
.seq-step {
    width: 22px; height: 22px; border: 1px solid #555; border-radius: 3px;
    background: #2a2a2a; cursor: pointer; flex-shrink: 0;
    transition: background 0.08s;
}
.seq-step.on { background: #0af; border-color: #0af; }
.seq-step.current { box-shadow: 0 0 4px 1px #ff0; }
.seq-step.on.current { box-shadow: 0 0 6px 2px #ff0; }
.seq-step.paused { box-shadow: 0 0 4px 1px #f80; border-color: #f80; animation: pausePulse 1s ease-in-out infinite; }
.seq-step.on.paused { box-shadow: 0 0 6px 2px #f80; animation: pausePulse 1s ease-in-out infinite; }
@keyframes pausePulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.seq-step:hover { border-color: #aaa; }
.seq-row .seq-remove {
    width: 18px; height: 18px; font-size: 10px; line-height: 16px;
    text-align: center; cursor: pointer; opacity: 0.3;
    border: none; background: none; color: var(--vscode-editor-foreground, #ccc);
    margin-left: 4px;
}
.seq-row .seq-remove:hover { opacity: 1; color: #f44; }
.seq-row .seq-remove.confirm { opacity: 1; color: #fff; background: #a00; border-color: #f44; }
.seq-row .seq-play-btn {
    width: 30px; height: 20px; font-size: 10px; line-height: 18px;
    text-align: center; cursor: pointer;
    border: 1px solid #555; border-radius: 3px;
    background: #2a2a2a; color: var(--vscode-editor-foreground, #ccc);
    flex-shrink: 0; margin-right: 2px;
}
.seq-row .seq-play-btn:hover { border-color: #aaa; }
.seq-row .seq-play-btn.playing { background: #0a4; color: #fff; border-color: #0a4; }
.seq-row .seq-len-btn {
    width: 18px; height: 18px; font-size: 13px; line-height: 16px;
    text-align: center; cursor: pointer;
    border: 1px solid #444; border-radius: 3px;
    background: #2a2a2a; color: var(--vscode-editor-foreground, #ccc);
    flex-shrink: 0; opacity: 0.4;
}
.seq-row .seq-len-btn:hover { opacity: 1; border-color: #aaa; }

/* ── Canvas wrapper ───────────────────────────────────────────────────── */
#layout-splitter {
    flex-shrink: 0;
    height: 10px;
    cursor: row-resize;
    position: relative;
    background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(0,0,0,0.18));
    touch-action: none;
}
#layout-splitter::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 84px; height: 3px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
}
#layout-splitter:hover::before,
#layout-splitter.dragging::before {
    background: rgba(255,255,255,0.34);
}
#canvas-wrap {
    flex: 1; overflow: hidden; min-height: 140px; position: relative;
}
#mp-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none; display: none;
}
#surface {
    position: relative; z-index: 2;
    display: block; width: 100%; height: 100%;
    /* transparent background so video shows through */
}

/* ── Knob tooltip ─────────────────────────────────────────────────────── */
#tooltip {
    position: fixed; z-index: 200; pointer-events: none;
    background: rgba(0,0,0,0.85); color: #0f0; padding: 3px 8px;
    border-radius: 4px; font-size: 11px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
    display: none; white-space: pre;
}

/* ── Rename dialog ────────────────────────────────────────────────────── */
#rename-dialog {
    position: fixed; z-index: 300; display: none;
    background: var(--vscode-input-background, #333);
    border: 1px solid var(--vscode-input-border, #555);
    border-radius: 4px; padding: 8px;
}
#rename-dialog input {
    background: var(--vscode-input-background, #3c3c3c);
    color: var(--vscode-input-foreground, #ccc);
    border: 1px solid var(--vscode-input-border, #555);
    border-radius: 3px; padding: 4px 8px; font-size: 13px; width: 140px;
    outline: none;
}
#rename-dialog input:focus { border-color: var(--vscode-focusBorder, #007fd4); }
#rename-dialog .knob-delete-btn {
    display: block; margin-top: 6px; width: 100%; padding: 3px 0;
    font-size: 11px; text-align: center; cursor: pointer;
    background: none; border: 1px solid #555; border-radius: 3px;
    color: #f44; opacity: 0.7;
}
#rename-dialog .knob-delete-btn:hover { opacity: 1; background: #a00; color: #fff; border-color: #f44; }
</style>
</head>
<body>

<div id="toolbar">
    <button id="btn-add" title="Add a new knob">＋ Add Knob</button>
    <button id="btn-add-macro" title="Add a new macro curve">＋ Add Macro</button>
    <button id="btn-add-seq" title="Add a new sequencer row">＋ Add Seq</button>
    <button id="btn-mp-toggle" title="Open MediaPipe webcam body tracking in browser">📷 Body</button>
    <span class="spacer"></span>
    <span class="status" id="status-text">0 knobs</span>
</div>

<!-- ── Sequencer section ──────────────────────────────────────────────── -->
<div id="seq-section">
    <div id="seq-header">
        <span class="arrow" id="seq-arrow">▾</span>
        <span>Sequencers</span>
        <span class="spacer" style="flex:1"></span>
        <span id="seq-count" style="opacity:0.5; font-size:10px;">0 seqs</span>
    </div>
    <div id="seq-body">
        <div id="seq-transport">
            <button id="seq-stop-all" title="Stop all macros + sequencers (reset)">■ All</button>
            <label style="font-size:10px; opacity:0.6;">BPM</label>
            <input type="number" id="seq-bpm" value="120" min="1" max="999" step="1" title="Beats per minute"/>
            <label style="font-size:10px; opacity:0.6;">÷</label>
            <select id="seq-subdiv" title="Subdivision" style="background:var(--vscode-input-background,#3c3c3c);color:var(--vscode-input-foreground,#ccc);border:1px solid var(--vscode-input-border,#555);border-radius:3px;font-size:11px;padding:2px;">
                <option value="1">1 (quarter)</option>
                <option value="2">2 (8th)</option>
                <option value="4" selected>4 (16th)</option>
                <option value="8">8 (32nd)</option>
            </select>
            <label style="font-size:10px; opacity:0.6; margin-left:6px; cursor:pointer; display:inline-flex; align-items:center; gap:3px;" title="Sync BPM to SuperCollider TempoClock.default">
                <input type="checkbox" id="seq-sync-sc" checked style="margin:0; cursor:pointer;"/>SC
            </label>
            <span class="seq-transport-spacer"></span>
            <button id="seq-tap" class="seq-tap-btn" title="Tap tempo">TAP</button>
        </div>
        <div id="macro-grid" class="macro-grid"></div>
        <div id="seq-grid"></div>
    </div>
</div>

<div id="layout-splitter" title="Drag to resize macro/sequencer area"></div>
<div id="canvas-wrap"><canvas id="mp-overlay"></canvas><canvas id="surface"></canvas></div>
<div id="tooltip"></div>
<div id="rename-dialog"><input id="rename-input" type="text" maxlength="16" placeholder="knob name"/><button id="knob-delete-btn" class="knob-delete-btn">Delete knob</button></div>

<script>
// ── VS Code webview API ──────────────────────────────────────────────────
const vscode = acquireVsCodeApi();

function getInitialPersistedState() {
    const hostState = globalThis.__ENVIL_INITIAL_STATE__;
    if (hostState && Object.keys(hostState).length > 0) return hostState;
    return vscode.getState() || null;
}

// ── Config ───────────────────────────────────────────────────────────────
const KNOB_RADIUS = 22;
const KNOB_GRAB_RADIUS = 30;        // slightly larger touch target
const EDGE_PAD = KNOB_RADIUS + 10;  // px inset so knobs reach full 0–1 at edges
const MIN_SEND_INTERVAL_MS = 25;    // throttle: max ~40 msgs/sec per knob
const MACRO_Y_PAD = 6;               // px inset so macro curves reach full 0–1 at top/bottom
const PROXY_PREFIX = 'v';           // ~v_name in proxyspace
const MIDI_BASE_NOTE = 60;           // first knob = C3 (MIDI 60), ascending chromatically

// ── MIDI note name helper ────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiNoteName(midi) {
    const name = NOTE_NAMES[midi % 12];
    const octave = Math.floor(midi / 12) - 2;   // C3 = 60 convention (middle C)
    return name + octave;
}
function knobMidiNote(knob) { return knob.midiNote || (MIDI_BASE_NOTE + ((knob.note || knob.id) - 1)); }

// ── Colour palette for knobs ─────────────────────────────────────────────
const COLORS = [
    '#0af', '#f80', '#0f0', '#f0f', '#ff0', '#0ff',
    '#f44', '#8f0', '#08f', '#fa0', '#a0f', '#0fa',
];

// ── State ────────────────────────────────────────────────────────────────
// Knob positions are stored NORMALISED (0–1).
//   nx: 0 = left edge,  1 = right edge
//   ny: 0 = top edge,   1 = bottom edge
// SC output: x = nx (left→right 0–1), y = ny (top→bottom 0–1)
let knobs = [];       // { id, name, nx, ny, color, lastSendTime }
let nextId = 1;
let dragKnob = null;
let dragOffNX = 0, dragOffNY = 0;   // grab offset in normalised coords
let contextKnob = null;
let tapStartNX = 0, tapStartNY = 0;  // for tap-vs-drag detection
let didDrag = false;                  // true once pointer moves past threshold
const TAP_MOVE_THRESH = 0.02;         // normalised distance — below this = tap, not drag

// ── Double-tap-hold state ────────────────────────────────────────────────
let holdKnob = null;                  // knob currently held (noteOn sustained)
let lastTapKnob_ = null;             // knob from previous tap
let lastTapTime_ = 0;                // timestamp of previous tap
const DOUBLE_TAP_MS = 400;           // max gap between taps for double-tap

const canvas = document.getElementById('surface');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const statusText = document.getElementById('status-text');
const renameDialog = document.getElementById('rename-dialog');
const renameInput = document.getElementById('rename-input');
const toolbarEl = document.getElementById('toolbar');
const seqSection = document.getElementById('seq-section');
const layoutSplitter = document.getElementById('layout-splitter');

const MIN_SEQ_SECTION_HEIGHT = 220;
const MIN_CANVAS_HEIGHT = 140;
const DEFAULT_SEQ_SECTION_VH = 58;
let seqSectionHeight = null;

// ── Migrate old pixel-based knobs → normalised ──────────────────────────
function migrateKnobs(arr) {
    for (const k of arr) {
        if (k.nx == null && k.x != null) {
            // Old format stored absolute pixel x,y — approximate normalise
            k.nx = Math.max(0, Math.min(1, k.x / 600));   // rough fallback
            k.ny = Math.max(0, Math.min(1, k.y / 400));
            delete k.x; delete k.y;
        }
        if (k.nx == null) k.nx = 0.5;
        if (k.ny == null) k.ny = 0.5;
        // Ensure stable note number + MIDI note (for old state without them)
        if (k.note == null) k.note = k.id;
        if (k.midiNote == null) k.midiNote = MIDI_BASE_NOTE + (k.note - 1);
    }
    return arr;
}

// ── Restore persisted state ──────────────────────────────────────────────
const saved = getInitialPersistedState();
if (saved && saved.knobs) {
    knobs = migrateKnobs(saved.knobs);
    nextId = saved.nextId || knobs.length + 1;
}

// ── Canvas resize ────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
function surfaceW() { return wrap.clientWidth  || 1; }
function surfaceH() { return wrap.clientHeight || 1; }

let _resizeRAF = 0;
function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = surfaceW();
    const h = surfaceH();
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (typeof applySeqSectionHeight === 'function') applySeqSectionHeight(seqSectionHeight, false);
    draw();
    if (typeof drawAllMacros === 'function') drawAllMacros();
}
// ResizeObserver fires on initial layout + every container size change,
// fixing the stale-dimensions problem on first load.
new ResizeObserver(() => {
    cancelAnimationFrame(_resizeRAF);
    _resizeRAF = requestAnimationFrame(resize);
}).observe(wrap);
window.addEventListener('resize', resize);

// ── Coordinate helpers ───────────────────────────────────────────────────
// Normalised 0–1 → pixel, with EDGE_PAD inset so full range is reachable
function pixelX(knob) { return EDGE_PAD + knob.nx * (surfaceW() - 2 * EDGE_PAD); }
function pixelY(knob) { return EDGE_PAD + knob.ny * (surfaceH() - 2 * EDGE_PAD); }

// Client (mouse/touch) → normalised, accounting for inset
function clientToNormX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left - EDGE_PAD) / ((rect.width || 1) - 2 * EDGE_PAD);
}
function clientToNormY(clientY) {
    const rect = canvas.getBoundingClientRect();
    return (clientY - rect.top - EDGE_PAD) / ((rect.height || 1) - 2 * EDGE_PAD);
}

function clampNorm(v) { return Math.max(0, Math.min(1, v)); }

// SC output values (both 0–1, same direction as visual)
function scX(knob) { return clampNorm(knob.nx); }
function scY(knob) { return clampNorm(knob.ny); }

// ── Draw ─────────────────────────────────────────────────────────────────
function draw() {
    const w = surfaceW();
    const h = surfaceH();
    ctx.clearRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
    for (let y = 0; y <= h; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

    // Crosshair lines at 50%
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
    ctx.setLineDash([]);

    // Draw each knob
    for (const k of knobs) {
        const kx = pixelX(k);
        const ky = pixelY(k);
        const isActive = k === dragKnob;

        // Shadow / glow
        ctx.shadowColor = k.color;
        ctx.shadowBlur = isActive ? 18 : 8;

        // Outer ring
        ctx.beginPath();
        ctx.arc(kx, ky, KNOB_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? k.color : hexAlpha(k.color, 0.25);
        ctx.fill();
        ctx.strokeStyle = k.color;
        ctx.lineWidth = isActive ? 2.5 : 1.5;
        ctx.stroke();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;

        // Note name in centre of knob
        ctx.font = 'bold 11px "JetBrains Mono", "Fira Code", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = isActive ? '#000' : '#222';
        ctx.fillText(midiNoteName(knobMidiNote(k)), kx, ky);

        // Label + value — flip above knob when near bottom edge
        const labelBelow = ky + KNOB_RADIUS + 22 < h;
        const ccLabel = '~' + PROXY_PREFIX + '_c' + knobMidiNote(k);
        const nameLabel = k.name;
        const PAD_X = 4, PAD_Y = 2;
        const LABEL_BG = 'rgba(0,0,0,0.65)';  // dark bg so text pops

        if (labelBelow) {
            // Row 1: proxy name + user name
            ctx.font = '11px "JetBrains Mono", "Fira Code", monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            const txt1 = ccLabel + '  ' + nameLabel;
            const m1 = ctx.measureText(txt1);
            const y1 = ky + KNOB_RADIUS + 4;
            ctx.fillStyle = LABEL_BG;
            ctx.fillRect(kx - m1.width / 2 - PAD_X, y1 - PAD_Y, m1.width + PAD_X * 2, 13 + PAD_Y * 2);
            ctx.fillStyle = k.color;
            ctx.fillText(txt1, kx, y1);

            // Row 2: XY values
            ctx.font = '10px monospace';
            const txt2 = scX(k).toFixed(2) + '  ' + scY(k).toFixed(2);
            const m2 = ctx.measureText(txt2);
            const y2 = ky + KNOB_RADIUS + 17;
            ctx.fillStyle = LABEL_BG;
            ctx.fillRect(kx - m2.width / 2 - PAD_X, y2 - PAD_Y, m2.width + PAD_X * 2, 12 + PAD_Y * 2);
            ctx.fillStyle = '#ffffffcc';
            ctx.fillText(txt2, kx, y2);
        } else {
            // Row 1: proxy name + user name
            ctx.font = '11px "JetBrains Mono", "Fira Code", monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            const txt1 = ccLabel + '  ' + nameLabel;
            const m1 = ctx.measureText(txt1);
            const y1 = ky - KNOB_RADIUS - 17;
            ctx.fillStyle = LABEL_BG;
            ctx.fillRect(kx - m1.width / 2 - PAD_X, y1 - 13 - PAD_Y, m1.width + PAD_X * 2, 13 + PAD_Y * 2);
            ctx.fillStyle = k.color;
            ctx.fillText(txt1, kx, y1);

            // Row 2: XY values
            ctx.font = '10px monospace';
            const txt2 = scX(k).toFixed(2) + '  ' + scY(k).toFixed(2);
            const m2 = ctx.measureText(txt2);
            const y2 = ky - KNOB_RADIUS - 4;
            ctx.fillStyle = LABEL_BG;
            ctx.fillRect(kx - m2.width / 2 - PAD_X, y2 - 12 - PAD_Y, m2.width + PAD_X * 2, 12 + PAD_Y * 2);
            ctx.fillStyle = '#ffffffcc';
            ctx.fillText(txt2, kx, y2);
        }
    }

    // ── Sustained glow ring while a knob is held ─────────────────────────
    if (holdKnob) {
        const hx = pixelX(holdKnob), hy = pixelY(holdKnob);
        // Pulsing glow: radius oscillates gently
        const pulse = Math.sin(Date.now() / 150) * 3;
        const r = KNOB_RADIUS + 6 + pulse;
        ctx.beginPath();
        ctx.arc(hx, hy, r, 0, Math.PI * 2);
        ctx.strokeStyle = hexAlpha(holdKnob.color, 0.8);
        ctx.lineWidth = 3;
        ctx.stroke();
        // Keep animating
        requestAnimationFrame(() => draw());
    }
}

function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
}

function darkenHex(hex, factor = 0.65) {
    const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
    const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
    const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
    return `rgb(${r},${g},${b})`;
}

// ── Hit test ─────────────────────────────────────────────────────────────
function hitTest(normX, normY) {
    // Compare in pixel space for consistent grab radius
    const mx = EDGE_PAD + normX * (surfaceW() - 2 * EDGE_PAD);
    const my = EDGE_PAD + normY * (surfaceH() - 2 * EDGE_PAD);
    for (let i = knobs.length - 1; i >= 0; i--) {
        const k = knobs[i];
        const dx = mx - pixelX(k);
        const dy = my - pixelY(k);
        if (dx * dx + dy * dy <= KNOB_GRAB_RADIUS * KNOB_GRAB_RADIUS) return k;
    }
    return null;
}

// ── Send values to extension ─────────────────────────────────────────────
function sendKnobValue(knob) {
    const now = Date.now();
    if (now - (knob.lastSendTime || 0) < MIN_SEND_INTERVAL_MS) return;
    knob.lastSendTime = now;

    vscode.postMessage({
        type: 'knob-move',
        id: knob.id,
        name: knob.name,
        midiNote: knobMidiNote(knob),
        x: parseFloat(scX(knob).toFixed(4)),
        y: parseFloat(scY(knob).toFixed(4)),
    });
}

function sendKnobValueForce(knob) {
    knob.lastSendTime = 0;
    sendKnobValue(knob);
}

// ── Pointer (mouse + touch unified) ─────────────────────────────────────
function getPointerNorm(e) {
    const src = e.touches ? e.touches[0] : e;
    return { nx: clientToNormX(src.clientX), ny: clientToNormY(src.clientY) };
}

// ── Mono guard: release any held note ─────────────────────────────────────
function releaseHold() {
    if (!holdKnob) return;
    vscode.postMessage({
        type: 'knob-hold-off',
        id: holdKnob.id,
        name: holdKnob.name,
        note: knobMidiNote(holdKnob),
    });
    flashKnob(holdKnob);
    holdKnob = null;
}

function onPointerDown(e) {
    closeRenameDialog();
    const { nx, ny } = getPointerNorm(e);
    const hit = hitTest(nx, ny);
    if (hit) {
        const now = Date.now();
        // Double-tap: only if the PREVIOUS interaction was a tap (not a drag)
        const isDoubleTap = (hit === lastTapKnob_ && now - lastTapTime_ < DOUBLE_TAP_MS);

        if (isDoubleTap) {
            // ── Double-tap-hold: noteOn now, noteOff on release ──────────
            releaseHold();  // mono: silence any previous note
            holdKnob = hit;
            dragKnob = null;
            dragOffNX = nx - hit.nx;
            dragOffNY = ny - hit.ny;
            vscode.postMessage({
                type: 'knob-hold-on',
                id: hit.id,
                name: hit.name,
                note: knobMidiNote(hit),
                x: parseFloat(scX(hit).toFixed(4)),
                y: parseFloat(scY(hit).toFixed(4)),
            });
            // Reset double-tap tracker so a third tap doesn't re-trigger
            lastTapKnob_ = null;
            lastTapTime_ = 0;
        } else {
            // ── Normal press: begin drag / single-tap detection ──────────
            releaseHold();  // mono: silence any previous note
            dragKnob = hit;
            dragOffNX = nx - hit.nx;
            dragOffNY = ny - hit.ny;
            tapStartNX = nx;
            tapStartNY = ny;
            didDrag = false;
            // NOTE: lastTapKnob_/lastTapTime_ set in onPointerUp (only on tap,
            // not drag) so that drag→quick-press doesn't misfire as double-tap
        }

        // Bring to front
        knobs = knobs.filter(k => k !== hit);
        knobs.push(hit);
        draw();
        e.preventDefault();
    }
}

function onPointerMove(e) {
    const { nx, ny } = getPointerNorm(e);

    // While holding: allow dragging the held knob (sustain + move)
    if (holdKnob) {
        holdKnob.nx = clampNorm(nx - dragOffNX);
        holdKnob.ny = clampNorm(ny - dragOffNY);
        sendKnobValue(holdKnob);
        updateTooltip(holdKnob);
        draw();
        e.preventDefault();
        return;
    }

    if (dragKnob) {
        // Check if movement is large enough to count as a drag
        const dnx = nx - tapStartNX, dny = ny - tapStartNY;
        if (Math.sqrt(dnx * dnx + dny * dny) > TAP_MOVE_THRESH) didDrag = true;

        dragKnob.nx = clampNorm(nx - dragOffNX);
        dragKnob.ny = clampNorm(ny - dragOffNY);
        sendKnobValue(dragKnob);
        updateTooltip(dragKnob);
        draw();
        e.preventDefault();
    } else {
        const hit = hitTest(nx, ny);
        if (hit) {
            updateTooltip(hit);
            canvas.style.cursor = 'grab';
        } else {
            tooltip.style.display = 'none';
            canvas.style.cursor = 'default';
        }
    }
}

function onPointerUp(e) {
    // ── Release a held knob: send noteOff ─────────────────────────────
    if (holdKnob) {
        releaseHold();
        lastTapKnob_ = null;   // reset so next tap is fresh
        lastTapTime_ = 0;
        tooltip.style.display = 'none';
        canvas.style.cursor = 'default';
        draw();
        return;
    }

    // ── Release after drag or single tap ──────────────────────────────
    if (dragKnob) {
        if (!didDrag) {
            // Tap! — send button trigger with MIDI note
            vscode.postMessage({
                type: 'knob-tap',
                id: dragKnob.id,
                name: dragKnob.name,
                note: knobMidiNote(dragKnob),
                x: parseFloat(scX(dragKnob).toFixed(4)),
                y: parseFloat(scY(dragKnob).toFixed(4)),
            });
            flashKnob(dragKnob);
            // Record this tap for double-tap detection
            lastTapKnob_ = dragKnob;
            lastTapTime_ = Date.now();
        } else {
            sendKnobValueForce(dragKnob);
            // Was a drag — reset double-tap tracker
            lastTapKnob_ = null;
            lastTapTime_ = 0;
        }
        dragKnob = null;
        tooltip.style.display = 'none';
        canvas.style.cursor = 'default';
        draw();
        persistState();
    }
}

// ── Tap flash animation ──────────────────────────────────────────────────
function flashKnob(knob) {
    let alpha = 1.0;
    const origColor = knob.color;
    function step() {
        alpha -= 0.06;
        if (alpha <= 0) { draw(); return; }
        draw();
        // Draw flash ring on top
        const kx = pixelX(knob), ky = pixelY(knob);
        const r = KNOB_RADIUS + 8 * (1 - alpha);
        ctx.beginPath();
        ctx.arc(kx, ky, r, 0, Math.PI * 2);
        ctx.strokeStyle = hexAlpha(origColor, alpha);
        ctx.lineWidth = 3;
        ctx.stroke();
        requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// Mouse events
canvas.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);

// Touch events
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
window.addEventListener('touchmove', onPointerMove, { passive: false });
window.addEventListener('touchend', onPointerUp);
window.addEventListener('touchcancel', onPointerUp);

// ── Right-click context menu (rename / delete) ──────────────────────────
canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const { nx, ny } = getPointerNorm(e);
    const hit = hitTest(nx, ny);
    if (hit) {
        contextKnob = hit;
        openRenameDialog(e.clientX, e.clientY, hit);
    }
});

// NOTE: rename via right-click / long-press context menu (see contextmenu handler above)

// ── Tooltip ──────────────────────────────────────────────────────────────
function updateTooltip(knob) {
    const rect = canvas.getBoundingClientRect();
    const kx = pixelX(knob);
    const ky = pixelY(knob);
    const mn = knobMidiNote(knob);
    tooltip.textContent = `~${PROXY_PREFIX}_c${mn}  ~${PROXY_PREFIX}_n${mn}  ${midiNoteName(mn)}\n${knob.name}  x: ${scX(knob).toFixed(3)}  y: ${scY(knob).toFixed(3)}`;
    tooltip.style.display = 'block';

    // Measure then pick visible side
    const tw = tooltip.offsetWidth  || 100;
    const th = tooltip.offsetHeight || 30;
    const gap = KNOB_RADIUS + 8;

    let tx = (kx + gap + tw < rect.width)
        ? rect.left + kx + gap
        : rect.left + kx - gap - tw;
    let ty = rect.top + ky - th / 2;
    if (ty < rect.top + 2)           ty = rect.top + 2;
    if (ty + th > rect.bottom - 2)   ty = rect.bottom - th - 2;

    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
}

// ── Rename dialog ────────────────────────────────────────────────────────
function openRenameDialog(clientX, clientY, knob) {
    renameDialog.style.display = 'block';
    renameDialog.style.left = clientX + 'px';
    renameDialog.style.top = clientY + 'px';
    renameInput.value = knob.name;
    renameInput.focus();
    renameInput.select();
}

function closeRenameDialog() {
    if (renameDialog.style.display === 'none') return;
    renameDialog.style.display = 'none';
    if (contextKnob && renameInput.value.trim()) {
        const oldName = contextKnob.name;
        const newName = renameInput.value.trim().replace(/[^a-zA-Z0-9_]/g, '');
        if (newName && newName !== oldName) {
            contextKnob.name = newName;
            vscode.postMessage({ type: 'knob-rename', id: contextKnob.id, oldName, newName });
            draw();
            persistState();
        }
    }
    contextKnob = null;
}

renameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') closeRenameDialog();
    if (e.key === 'Escape') { renameDialog.style.display = 'none'; contextKnob = null; }
});
renameInput.addEventListener('blur', () => { closeRenameDialog(); });

document.getElementById('knob-delete-btn').addEventListener('mousedown', (e) => {
    e.preventDefault(); // prevent blur from firing first
    if (contextKnob) {
        const k = contextKnob;
        renameDialog.style.display = 'none';
        contextKnob = null;
        removeKnob(k);
    }
});

// ── Add knob ─────────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', () => {
    addKnob();
});

function addKnob(name, nx, ny) {
    const id = nextId++;
    const midiNote = MIDI_BASE_NOTE + (id - 1);  // C3, C#3, D3, ...
    const knob = {
        id,
        note: id,        // stable index (1-based)
        midiNote,        // actual MIDI note number (60, 61, 62, ...)
        name: name || midiNoteName(midiNote),
        nx: nx != null ? nx : 0.3 + Math.random() * 0.4,   // default: centre ± spread
        ny: ny != null ? ny : 0.3 + Math.random() * 0.4,
        color: COLORS[(id - 1) % COLORS.length],
        lastSendTime: 0,
    };
    knobs.push(knob);
    vscode.postMessage({ type: 'knob-add', id: knob.id, name: knob.name, midiNote, x: scX(knob), y: scY(knob) });
    updateStatus();
    draw();
    persistState();
    return knob;
}

// ── Delete knob ──────────────────────────────────────────────────────────
function removeKnob(knob) {
    knobs = knobs.filter(k => k !== knob);
    vscode.postMessage({ type: 'knob-remove', id: knob.id, name: knob.name, midiNote: knobMidiNote(knob) });
    updateStatus();
    draw();
    persistState();
}

// Init All removed — proxies now self-heal via isPlaying.not checks

// ── Keyboard shortcuts ───────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
    if ((e.key === 'Delete' || e.key === 'Backspace') && contextKnob && renameDialog.style.display === 'none') {
        removeKnob(contextKnob);
        contextKnob = null;
    }
    if (e.key === 'a' && document.activeElement !== renameInput) {
        addKnob();
    }
});

// ── Persist state ────────────────────────────────────────────────────────
let _runtimePersistTimer = null;

function buildPersistedState() {
    return {
        knobs,
        nextId,
        macros: macros.map(m => ({
            name: m.name,
            macroNum: m.macroNum,
            points: m.points.slice(),
            playing: m.playing,
            loop: m.loop,
            durationSec: m.durationSec,
            durationBeats: m.durationBeats,
            currentPos: m.currentPos,
        })),
        macroNextId,
        seqs: seqs.map(s => ({ name: s.name, steps: s.steps.slice(), playing: s.playing })),
        seqNextId,
        seqBpm,
        seqSubdiv,
        seqSyncSC,
        seqSectionHeight,
    };
}

function defaultSeqSectionHeight() {
    const available = window.innerHeight - (toolbarEl ? toolbarEl.offsetHeight : 32) - 10 - MIN_CANVAS_HEIGHT;
    return Math.round(Math.max(MIN_SEQ_SECTION_HEIGHT, available * (DEFAULT_SEQ_SECTION_VH / 100)));
}

function maxSeqSectionHeight() {
    const available = window.innerHeight - (toolbarEl ? toolbarEl.offsetHeight : 32) - 10 - MIN_CANVAS_HEIGHT;
    return Math.max(MIN_SEQ_SECTION_HEIGHT, Math.round(available));
}

function clampSeqSectionHeight(height) {
    const n = Math.round(Number(height) || defaultSeqSectionHeight());
    return Math.max(MIN_SEQ_SECTION_HEIGHT, Math.min(maxSeqSectionHeight(), n));
}

function applySeqSectionHeight(height, shouldPersist = false) {
    seqSectionHeight = clampSeqSectionHeight(height);
    if (seqSection) seqSection.style.height = `${seqSectionHeight}px`;
    if (shouldPersist) persistState();
}

function wireLayoutSplitter() {
    let dragPointerId = null;

    layoutSplitter.addEventListener('pointerdown', (e) => {
        const isPrimaryPress = e.button === 0 || e.pointerType === 'touch' || e.pointerType === 'pen';
        if (!isPrimaryPress) return;
        dragPointerId = e.pointerId;
        layoutSplitter.classList.add('dragging');
        layoutSplitter.setPointerCapture(e.pointerId);
        e.preventDefault();
    });

    layoutSplitter.addEventListener('pointermove', (e) => {
        if (dragPointerId == null || e.pointerId !== dragPointerId) return;
        const top = seqSection.getBoundingClientRect().top;
        applySeqSectionHeight(e.clientY - top, false);
        e.preventDefault();
    });

    const stopDrag = (e) => {
        if (dragPointerId == null || e.pointerId !== dragPointerId) return;
        dragPointerId = null;
        layoutSplitter.classList.remove('dragging');
        persistState();
        e.preventDefault();
    };

    layoutSplitter.addEventListener('pointerup', stopDrag);
    layoutSplitter.addEventListener('pointercancel', stopDrag);
}

function persistState() {
    const state = buildPersistedState();
    vscode.setState(state);
    vscode.postMessage({ type: 'panel-state-cache', state });
}

function scheduleRuntimePersist(delay = 500) {
    if (_runtimePersistTimer) return;
    _runtimePersistTimer = setTimeout(() => {
        _runtimePersistTimer = null;
        persistState();
    }, delay);
}

function updateStatus() {
    const macroText = macros.length > 0 ? '  ·  ' + macros.length + ' macro' + (macros.length !== 1 ? 's' : '') : '';
    const seqText = seqs.length > 0 ? '  ·  ' + seqs.length + ' seq' + (seqs.length !== 1 ? 's' : '') : '';
    statusText.textContent = knobs.length + ' knob' + (knobs.length !== 1 ? 's' : '') + macroText + seqText;
    if (typeof macroGrid !== 'undefined' && macroGrid) {
        macroGrid.style.display = macros.length > 0 ? '' : 'none';
    }
    document.getElementById('seq-count').textContent =
        (macros.length > 0 ? macros.length + ' macro' + (macros.length !== 1 ? 's' : '') + ' · ' : '') +
        seqs.length + ' seq' + (seqs.length !== 1 ? 's' : '');
}

// ── Messages from extension ──────────────────────────────────────────────
window.addEventListener('message', (event) => {
    const msg = event.data;
    if (msg.type === 'restore-knobs') {
        knobs = migrateKnobs(msg.knobs || []);
        nextId = msg.nextId || knobs.length + 1;
        knobs.forEach((k, i) => { if (!k.color) k.color = COLORS[i % COLORS.length]; });
        updateStatus();
        draw();
        persistState();
    }
    if (msg.type === 'restore-seqs') {
        const arr = msg.seqs || [];
        seqs = [];
        arr.forEach(s => addSeq(s.name, s.steps, s.playing));
        seqNextId = msg.seqNextId || seqs.length + 1;
        if (msg.seqBpm) { seqBpm = msg.seqBpm; document.getElementById('seq-bpm').value = seqBpm; }
        if (msg.seqSubdiv) { seqSubdiv = msg.seqSubdiv; document.getElementById('seq-subdiv').value = seqSubdiv; }
        updateStatus();
        persistState();
    }
    if (msg.type === 'seq-tempo-update') {
        // SC TempoClock.default.tempo pushed from extension host
        const newBpm = Math.round(msg.bpm);
        if (newBpm >= 1 && newBpm <= 999) {
            seqBpm = newBpm;
            seqBpmInput.value = seqBpm;
            persistState();
        }
    }
    if (msg.type === 'macro-visual-update') {
        const updates = msg.macros || [];
        let shouldPersist = false;
        for (const update of updates) {
            const m = macros.find(x => x.name === update.name);
            if (!m) continue;
            const wasPlaying = m.playing;
            if (update.position != null) m.currentPos = Math.max(0, Math.min(1, update.position));
            if (update.val != null) m.currentVal = Math.max(0, Math.min(1, update.val));
            if (update.playing != null) m.playing = !!update.playing;
            if (update.loop != null) m.loop = !!update.loop;
            if (wasPlaying !== m.playing) shouldPersist = true;
            syncMacroRowControls(m);
            drawMacroRow(m);
        }
        if (shouldPersist) persistState();
        else if (updates.length > 0) scheduleRuntimePersist();
    }
    if (msg.type === 'seq-visual-tick') {
        // Extension host drives the clock; we just update visuals
        const ticks = msg.ticks || [];
        for (const t of ticks) {
            const s = seqs.find(x => x.name === t.name);
            if (s) s.currentStep = t.step;
        }
        updateSeqStepVisuals();
    }
    if (msg.type === 'mediapipe-config') {
        // Settings changed from extension host
        if (typeof mpApplyConfig === 'function') {
            mpApplyConfig(msg);
        }
    }
    if (msg.type === 'mediapipe-overlay') {
        // Landmark data forwarded from extension host (originally from capture page)
        if (typeof mpDrawOverlay === 'function') {
            mpDrawOverlay(msg.landmarks);
        }
    }
});

// ═══════════════════════════════════════════════════════════════════════════
// ── MACRO CURVES + SEQUENCER SYSTEM ─────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════

const MACRO_POINT_COUNT = 256;
const MACRO_DEFAULT_SECONDS = 30;
const MACRO_DEFAULT_BEATS = 64;
const MACRO_CURVE_SYNC_MS = 40;
const MACRO_COLORS = ['#7dd3fc', '#f9a8d4', '#86efac', '#fcd34d', '#c4b5fd', '#fb7185'];
const SEQ_DEFAULT_STEPS = 8;
const SEQ_COLORS = ['#0af','#f80','#0f0','#f0f','#ff0','#0ff','#f44','#8f0','#08f','#fa0'];

let macros = [];         // [{ name, points, currentPos, currentVal, playing, durationSec, durationBeats }]
let macroNextId = 1;
let activeMacroEdit = null;

let seqs = [];           // [{ name, steps, currentStep, color, playing }]
let seqNextId = 1;
let seqBpm = 120;
let seqSubdiv = 4;       // steps per beat: 4 = 16th notes

const macroGrid     = document.getElementById('macro-grid');
const seqGrid       = document.getElementById('seq-grid');
const seqArrow      = document.getElementById('seq-arrow');
const seqBody       = document.getElementById('seq-body');
const seqHeader     = document.getElementById('seq-header');
const seqStopAllBtn = document.getElementById('seq-stop-all');
const seqTapBtn     = document.getElementById('seq-tap');
const seqBpmInput   = document.getElementById('seq-bpm');
const seqSubdivSel  = document.getElementById('seq-subdiv');
const seqSyncCb     = document.getElementById('seq-sync-sc');
let seqSyncSC = true;    // sync to SC TempoClock by default
let seqTapTimes = [];
let seqTapFlashTimer = null;

function clamp01f(v) {
    return Math.max(0, Math.min(1, Number(v) || 0));
}

function positiveNum(v, fallback) {
    const n = Number(v);
    return Number.isFinite(n) && n > 0 ? n : fallback;
}

function positiveInt(v, fallback) {
    return Math.max(1, Math.floor(positiveNum(v, fallback)));
}

function flashSeqTapButton() {
    if (!seqTapBtn) return;
    seqTapBtn.classList.add('flash');
    if (seqTapFlashTimer) clearTimeout(seqTapFlashTimer);
    seqTapFlashTimer = setTimeout(() => {
        seqTapFlashTimer = null;
        seqTapBtn.classList.remove('flash');
    }, 120);
}

function updateSeqTapButtonUI() {
    if (!seqTapBtn) return;
    seqTapBtn.classList.toggle('syncing', !!seqSyncSC);
    seqTapBtn.title = seqSyncSC
        ? 'Tap SuperCollider time sync input'
        : 'Tap to set local tempo';
}

function tappedBpmFromNow(now) {
    if (seqTapTimes.length > 0 && (now - seqTapTimes[seqTapTimes.length - 1]) > 2200) {
        seqTapTimes = [];
    }
    seqTapTimes.push(now);
    if (seqTapTimes.length > 6) seqTapTimes.shift();
    if (seqTapTimes.length < 2) return null;

    const intervals = [];
    for (let i = 1; i < seqTapTimes.length; i++) {
        const dt = seqTapTimes[i] - seqTapTimes[i - 1];
        if (dt >= 120 && dt <= 3000) intervals.push(dt);
    }
    if (intervals.length === 0) return null;

    const avgInterval = intervals.reduce((sum, dt) => sum + dt, 0) / intervals.length;
    return Math.max(1, Math.min(999, Math.round(60000 / avgInterval)));
}

function syncMacroDurationPair(m, sourceMode = (seqSyncSC ? 'beats' : 'seconds')) {
    const bpm = Math.max(1, seqBpm || 120);
    if (sourceMode === 'beats') {
        const beats = Math.max(0.1, positiveNum(m.durationBeats, (positiveNum(m.durationSec, MACRO_DEFAULT_SECONDS) * bpm) / 60));
        m.durationBeats = beats;
        m.durationSec = Math.max(0.1, (beats * 60) / bpm);
        return;
    }
    const sec = Math.max(0.1, positiveNum(m.durationSec, (positiveNum(m.durationBeats, MACRO_DEFAULT_BEATS) * 60) / bpm));
    m.durationSec = sec;
    m.durationBeats = Math.max(0.1, (sec * bpm) / 60);
}

function applyLocalBpm(nextBpm) {
    const clampedBpm = Math.max(1, Math.min(999, Math.round(nextBpm) || 120));
    seqBpm = clampedBpm;
    seqBpmInput.value = seqBpm;
    vscode.postMessage({ type: 'seq-set-bpm', bpm: seqBpm, subdiv: seqSubdiv });
    persistState();
}

function registerTapTempo() {
    const now = performance.now();
    flashSeqTapButton();
    const nextBpm = tappedBpmFromNow(now);

    if (seqSyncSC) {
        vscode.postMessage({ type: 'seq-tempo-tap', bpm: nextBpm });
        return;
    }

    if (nextBpm == null) return;
    applyLocalBpm(nextBpm);
}

function createMacroPoints(fill = 0.5) {
    return new Array(MACRO_POINT_COUNT).fill(clamp01f(fill));
}

function normalizeMacroPoints(points) {
    if (!Array.isArray(points) || points.length === 0) return createMacroPoints(0.5);
    return points.map(clamp01f);
}

function macroSampleAt(m, pos) {
    const points = normalizeMacroPoints(m.points);
    if (points.length === 1) return clamp01f(points[0]);
    const scaled = clamp01f(pos) * (points.length - 1);
    const i = Math.floor(scaled);
    const frac = scaled - i;
    const a = clamp01f(points[i]);
    const b = clamp01f(points[Math.min(points.length - 1, i + 1)]);
    return clamp01f(a + (b - a) * frac);
}

function macroDurationDisplay(m) {
    return seqSyncSC ? positiveNum(m.durationBeats, MACRO_DEFAULT_BEATS) : positiveNum(m.durationSec, MACRO_DEFAULT_SECONDS);
}

function macroDurationUnit() {
    return seqSyncSC ? 'beats' : 'sec';
}

function macroLoopDefault(loop) {
    return loop == null ? true : !!loop;
}

function addMacro(name, points, playing, durationSec, durationBeats, currentPos, loop, macroNum) {
    const id = macroNextId++;
    const safePoints = normalizeMacroPoints(points);
    const m = {
        id,
        name: name || 'macro' + id,
        macroNum: positiveInt(macroNum, id),
        points: safePoints,
        currentPos: clamp01f(currentPos != null ? currentPos : 0),
        currentVal: 0,
        color: MACRO_COLORS[(id - 1) % MACRO_COLORS.length],
        playing: playing !== false,
        loop: macroLoopDefault(loop),
        durationSec: positiveNum(durationSec, MACRO_DEFAULT_SECONDS),
        durationBeats: positiveNum(durationBeats, MACRO_DEFAULT_BEATS),
        syncTimer: null,
    };
    syncMacroDurationPair(m, seqSyncSC ? 'beats' : 'seconds');
    m.currentVal = macroSampleAt(m, m.currentPos);
    macros.push(m);
    renderMacroRow(m);
    syncMacroRowControls(m);
    drawMacroRow(m);
    updateStatus();
    vscode.postMessage({
        type: 'macro-create',
        name: m.name,
        macroNum: m.macroNum,
        points: m.points,
        playing: m.playing,
        loop: m.loop,
        durationSec: m.durationSec,
        durationBeats: m.durationBeats,
        currentPos: m.currentPos,
    });
    return m;
}

function removeMacro(m) {
    if (m.syncTimer) {
        clearTimeout(m.syncTimer);
        m.syncTimer = null;
    }
    macros = macros.filter(x => x !== m);
    const row = document.getElementById('macro-row-' + m.id);
    if (row) row.remove();
    vscode.postMessage({ type: 'macro-remove', name: m.name });
    updateStatus();
    persistState();
}

function renderMacroRow(m) {
    const existing = document.getElementById('macro-row-' + m.id);
    const nextSibling = existing ? existing.nextSibling : null;
    if (existing) existing.remove();

    const row = document.createElement('div');
    row.className = 'macro-row';
    row.id = 'macro-row-' + m.id;

    const btnStack = document.createElement('div');
    btnStack.className = 'macro-btn-stack';

    const playBtn = document.createElement('div');
    playBtn.className = 'macro-play-btn';
    playBtn.id = 'macro-play-' + m.id;
    playBtn.addEventListener('click', () => {
        if (!m.playing && m.currentPos >= 0.999) {
            seekMacroToPos(m, 0, true);
        }
        m.playing = !m.playing;
        syncMacroRowControls(m);
        vscode.postMessage({ type: 'macro-play-toggle', name: m.name, playing: m.playing, loop: m.loop, currentPos: m.currentPos });
        persistState();
    });
    btnStack.appendChild(playBtn);

    const loopBtn = document.createElement('div');
    loopBtn.className = 'macro-loop-btn';
    loopBtn.id = 'macro-loop-' + m.id;
    loopBtn.textContent = '↻';
    loopBtn.title = 'Loop macro';
    loopBtn.addEventListener('click', () => {
        m.loop = !m.loop;
        syncMacroRowControls(m);
        vscode.postMessage({ type: 'macro-set-loop', name: m.name, loop: m.loop });
        persistState();
    });
    btnStack.appendChild(loopBtn);

    const rm = document.createElement('button');
    rm.className = 'macro-remove';
    rm.textContent = '✕';
    rm.title = 'Remove macro (click twice to confirm)';
    let rmPending = false;
    let rmTimer = null;
    rm.addEventListener('click', () => {
        if (rmPending) {
            clearTimeout(rmTimer);
            removeMacro(m);
        } else {
            rmPending = true;
            rm.classList.add('confirm');
            rm.textContent = '✕?';
            rmTimer = setTimeout(() => {
                rmPending = false;
                rm.classList.remove('confirm');
                rm.textContent = '✕';
            }, 2000);
        }
    });
    btnStack.appendChild(rm);
    row.appendChild(btnStack);

    const label = document.createElement('span');
    label.className = 'macro-label';
    label.id = 'macro-label-' + m.id;
    label.textContent = m.name;
    label.style.color = m.color;
    label.title = 'Click to rename';
    label.addEventListener('click', () => {
        const newName = prompt('Rename macro curve:', m.name);
        if (newName && newName.trim()) {
            const old = m.name;
            m.name = newName.trim().replace(/[^a-zA-Z0-9_]/g, '');
            label.textContent = m.name;
            vscode.postMessage({ type: 'macro-rename', oldName: old, newName: m.name });
            persistState();
        }
    });
    // label is appended to canvasWrap later (overlaid on canvas)

    const durationInput = document.createElement('input');
    durationInput.className = 'macro-duration';
    durationInput.id = 'macro-duration-' + m.id;
    durationInput.type = 'number';
    durationInput.min = '0.1';
    durationInput.step = '0.1';
    durationInput.readOnly = true;
    durationInput.title = 'Double-click to type a value (Enter to apply, Esc to cancel) · Hold and drag up/down';
    const applyDurationValue = (commit = false) => {
        const raw = parseFloat(durationInput.value);
        if (!Number.isFinite(raw) || raw <= 0) {
            if (commit) durationInput.value = String(macroDurationDisplay(m));
            return;
        }
        const value = positiveNum(raw, macroDurationDisplay(m));
        if (seqSyncSC) {
            m.durationBeats = value;
            syncMacroDurationPair(m, 'beats');
        } else {
            m.durationSec = value;
            syncMacroDurationPair(m, 'seconds');
        }
        durationInput.value = String(macroDurationDisplay(m));
        vscode.postMessage({
            type: 'macro-set-duration',
            name: m.name,
            durationSec: m.durationSec,
            durationBeats: m.durationBeats,
        });
        persistState();
    };
    // Double-click → enter edit mode (readonly off, select text)
    let _durEditPrev = '';
    durationInput.addEventListener('dblclick', (e) => {
        e.preventDefault();
        _durEditPrev = durationInput.value;
        durationInput.readOnly = false;
        durationInput.select();
    });
    // Enter → commit, Escape → cancel
    durationInput.addEventListener('keydown', (e) => {
        if (durationInput.readOnly) return;
        if (e.key === 'Enter') {
            e.preventDefault();
            durationInput.readOnly = true;
            applyDurationValue(true);
            durationInput.blur();
        } else if (e.key === 'Escape') {
            e.preventDefault();
            durationInput.value = _durEditPrev;
            durationInput.readOnly = true;
            durationInput.blur();
        }
    });
    // Blur → cancel if still in edit mode
    durationInput.addEventListener('blur', () => {
        if (!durationInput.readOnly) {
            durationInput.value = _durEditPrev;
            durationInput.readOnly = true;
        }
    });
    wireMacroDurationDrag(durationInput, m, applyDurationValue);

    const durWrap = document.createElement('div');
    durWrap.className = 'macro-dur-wrap';
    durWrap.appendChild(durationInput);

    const unit = document.createElement('span');
    unit.className = 'macro-unit';
    unit.id = 'macro-unit-' + m.id;
    durWrap.appendChild(unit);
    row.appendChild(durWrap);

    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'macro-canvas-wrap';
    canvasWrap.title = 'Draw in the curve area · Use the bottom bar to seek';
    const canvasEl = document.createElement('canvas');
    canvasEl.className = 'macro-canvas';
    canvasEl.id = 'macro-canvas-' + m.id;
    canvasWrap.appendChild(canvasEl);
    row.appendChild(label);

    const seekBar = document.createElement('div');
    seekBar.className = 'macro-seekbar';
    seekBar.id = 'macro-seekbar-' + m.id;
    seekBar.title = 'Drag or tap to set macro head position';

    const seekFill = document.createElement('div');
    seekFill.className = 'macro-seekfill';
    seekFill.id = 'macro-seekfill-' + m.id;
    seekBar.appendChild(seekFill);

    const seekHead = document.createElement('div');
    seekHead.className = 'macro-seekhead';
    seekHead.id = 'macro-seekhead-' + m.id;
    seekBar.appendChild(seekHead);

    const seekLabel = document.createElement('div');
    seekLabel.className = 'macro-seeklabel';
    seekLabel.textContent = 'SEEK';
    seekBar.appendChild(seekLabel);

    canvasWrap.appendChild(seekBar);
    row.appendChild(canvasWrap);

    if (nextSibling) {
        macroGrid.insertBefore(row, nextSibling);
    } else {
        macroGrid.appendChild(row);
    }

    wireMacroCanvas(canvasEl, m);
    wireMacroSeekBar(seekBar, m);
}

function drawMacroRow(m) {
    const canvasEl = document.getElementById('macro-canvas-' + m.id);
    if (!canvasEl) return;
    const rect = canvasEl.getBoundingClientRect();
    const width = Math.max(1, Math.round(rect.width));
    const height = Math.max(1, Math.round(rect.height));
    const dpr = window.devicePixelRatio || 1;
    canvasEl.width = width * dpr;
    canvasEl.height = height * dpr;
    const g = canvasEl.getContext('2d');
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    g.clearRect(0, 0, width, height);

    g.fillStyle = 'rgba(255,255,255,0.015)';
    g.fillRect(0, 0, width, height);

    g.strokeStyle = 'rgba(255,255,255,0.05)';
    g.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
        const y = (height / 4) * i;
        g.beginPath(); g.moveTo(0, y); g.lineTo(width, y); g.stroke();
    }
    for (let i = 1; i < 8; i++) {
        const x = (width / 8) * i;
        g.beginPath(); g.moveTo(x, 0); g.lineTo(x, height); g.stroke();
    }

    const points = normalizeMacroPoints(m.points);
    g.beginPath();
    points.forEach((value, i) => {
        const x = (i / (points.length - 1)) * width;
        const y = macroPixelY(value, height);
        if (i === 0) g.moveTo(x, y);
        else g.lineTo(x, y);
    });

    g.lineTo(width, height);
    g.lineTo(0, height);
    g.closePath();
    g.fillStyle = hexAlpha(m.color, 0.18);
    g.fill();

    g.beginPath();
    points.forEach((value, i) => {
        const x = (i / (points.length - 1)) * width;
        const y = macroPixelY(value, height);
        if (i === 0) g.moveTo(x, y);
        else g.lineTo(x, y);
    });
    g.strokeStyle = m.color;
    g.lineWidth = 2;
    g.stroke();

    const playX = clamp01f(m.currentPos) * width;
    const playY = macroPixelY(macroSampleAt(m, m.currentPos), height);
    g.beginPath();
    g.moveTo(playX, 0);
    g.lineTo(playX, height);
    g.strokeStyle = m.playing ? 'rgba(255,255,120,0.95)' : 'rgba(255,170,70,0.95)';
    g.lineWidth = 1.5;
    g.stroke();

    g.beginPath();
    g.arc(playX, playY, 4, 0, Math.PI * 2);
    g.fillStyle = m.playing ? '#fff5a0' : '#ffb36b';
    g.fill();

    g.font = '10px monospace';
    g.textAlign = 'left';
    g.textBaseline = 'top';
    g.fillStyle = '#ffffffaa';
    g.fillText('1', 4, 2);
    g.textBaseline = 'bottom';
    g.fillText('0', 4, height - 2);
    g.textBaseline = 'top';
    g.textAlign = 'right';
    g.fillText(m.currentVal.toFixed(2), width - 6, 2);
    updateMacroSeekBar(m);
}

function drawAllMacros() {
    for (const m of macros) drawMacroRow(m);
}

function syncMacroRowControls(m) {
    const playBtn = document.getElementById('macro-play-' + m.id);
    const loopBtn = document.getElementById('macro-loop-' + m.id);
    const durationInput = document.getElementById('macro-duration-' + m.id);
    const unit = document.getElementById('macro-unit-' + m.id);
    const label = document.getElementById('macro-label-' + m.id);
    if (playBtn) {
        playBtn.classList.toggle('playing', !!m.playing);
        playBtn.textContent = m.playing ? '⏸' : '▶';
        playBtn.title = m.playing ? 'Pause' : 'Play';
    }
    if (loopBtn) {
        loopBtn.classList.toggle('active', !!m.loop);
        loopBtn.title = m.loop ? 'Looping on' : 'Looping off';
    }
    if (durationInput) {
        if (durationInput.readOnly) durationInput.value = String(macroDurationDisplay(m));
        durationInput.title = seqSyncSC ? 'Macro duration in beats' : 'Macro duration in seconds';
    }
    if (unit) unit.textContent = macroDurationUnit();
    if (label) label.textContent = m.name;
    updateMacroSeekBar(m);
}

function updateMacroSeekBar(m) {
    const seekFill = document.getElementById('macro-seekfill-' + m.id);
    const seekHead = document.getElementById('macro-seekhead-' + m.id);
    if (seekFill) seekFill.style.width = `${clamp01f(m.currentPos) * 100}%`;
    if (seekHead) seekHead.style.left = `${clamp01f(m.currentPos) * 100}%`;
}

function updateMacroDurationUIs() {
    for (const m of macros) syncMacroRowControls(m);
}

function formatMacroDurationValue(value) {
    const n = Math.max(0.1, positiveNum(value, 0.1));
    if (n < 1) return n.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    if (n < 10) return n.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    return n.toFixed(1).replace(/\.0$/, '');
}

function wireMacroDurationDrag(inputEl, m, applyDurationValue) {
    let drag = null;

    inputEl.addEventListener('pointerdown', (e) => {
        if (!inputEl.readOnly) return;  // in edit mode — let normal text input work
        const isPrimaryPress = e.button === 0 || e.pointerType === 'touch' || e.pointerType === 'pen';
        if (!isPrimaryPress) return;
        drag = {
            pointerId: e.pointerId,
            lastY: e.clientY,
            lastTime: performance.now(),
            accumValue: macroDurationDisplay(m),
            dragging: false,
        };
        inputEl.setPointerCapture(e.pointerId);
    });

    inputEl.addEventListener('pointermove', (e) => {
        if (!drag || drag.pointerId !== e.pointerId) return;
        const stepY = drag.lastY - e.clientY;   // positive = drag up = increase
        if (!drag.dragging && Math.abs(stepY) < 3) return;
        drag.dragging = true;

        const now = performance.now();
        const stepTime = Math.max(8, now - drag.lastTime);
        drag.lastY = e.clientY;
        drag.lastTime = now;

        // Acceleration: faster drag → bigger steps (but applied per-increment, not total)
        const speed = Math.abs(stepY) / stepTime;   // px/ms
        const accel = 1 + Math.min(3, speed * 4);   // 1× to 4× boost
        // Scale sensitivity to the current value so small values get fine control
        const valueFactor = Math.max(0.25, Math.pow(Math.max(drag.accumValue, 0.1), 0.55));
        const baseSensitivity = e.shiftKey ? 0.003 : 0.015;
        drag.accumValue = Math.max(0.1, drag.accumValue + stepY * baseSensitivity * valueFactor * accel);
        inputEl.value = formatMacroDurationValue(drag.accumValue);
        applyDurationValue(false);
        e.preventDefault();
    });

    const stopDrag = (e) => {
        if (!drag || drag.pointerId !== e.pointerId) return;
        const wasDragging = drag.dragging;
        drag = null;
        if (wasDragging) {
            applyDurationValue(true);
            inputEl.blur();
        }
    };

    inputEl.addEventListener('pointerup', stopDrag);
    inputEl.addEventListener('pointercancel', stopDrag);
}

function scheduleMacroCurveSync(m, immediate = false) {
    if (immediate) {
        if (m.syncTimer) clearTimeout(m.syncTimer);
        m.syncTimer = null;
        vscode.postMessage({ type: 'macro-update-curve', name: m.name, points: m.points, currentPos: m.currentPos });
        return;
    }
    if (m.syncTimer) return;
    m.syncTimer = setTimeout(() => {
        m.syncTimer = null;
        vscode.postMessage({ type: 'macro-update-curve', name: m.name, points: m.points, currentPos: m.currentPos });
    }, MACRO_CURVE_SYNC_MS);
}

function macroCanvasPos(canvasEl, clientX, clientY) {
    const rect = canvasEl.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const y = clientY - rect.top;   // don't clamp — let overshoot reach exact 0/1
    return { rect, x, y };
}

function macroIndexFromX(width, x, pointsLength) {
    if (pointsLength <= 1) return 0;
    return Math.max(0, Math.min(pointsLength - 1, Math.round((x / Math.max(1, width)) * (pointsLength - 1))));
}

function macroValueFromY(height, y) {
    // Map with inset so the physical top/bottom edges overshoot past 0–1
    const usable = Math.max(1, height - 2 * MACRO_Y_PAD);
    return clamp01f(1 - ((y - MACRO_Y_PAD) / usable));
}

function macroPixelY(value, height) {
    const usable = height - 2 * MACRO_Y_PAD;
    return MACRO_Y_PAD + (1 - clamp01f(value)) * usable;
}

function applyMacroDrawAt(m, canvasEl, clientX, clientY) {
    const { rect, x, y } = macroCanvasPos(canvasEl, clientX, clientY);
    const index = macroIndexFromX(rect.width, x, m.points.length);
    const value = macroValueFromY(rect.height, y);

    if (activeMacroEdit && activeMacroEdit.lastIndex != null) {
        const start = activeMacroEdit.lastIndex;
        const end = index;
        const span = Math.max(1, Math.abs(end - start));
        for (let i = 0; i <= span; i++) {
            const t = span === 0 ? 0 : i / span;
            const idx = start + Math.round((end - start) * t);
            const v = activeMacroEdit.lastValue + (value - activeMacroEdit.lastValue) * t;
            m.points[idx] = clamp01f(v);
        }
    } else {
        m.points[index] = value;
    }

    activeMacroEdit.lastIndex = index;
    activeMacroEdit.lastValue = value;
    m.currentVal = macroSampleAt(m, m.currentPos);
    drawMacroRow(m);
    scheduleMacroCurveSync(m);
}

function seekMacroToPos(m, pos, silent = false) {
    m.currentPos = clamp01f(pos);
    m.currentVal = macroSampleAt(m, m.currentPos);
    drawMacroRow(m);
    if (!silent) {
        vscode.postMessage({ type: 'macro-seek', name: m.name, position: m.currentPos });
    }
}

function seekMacroFromEvent(m, canvasEl, clientX, clientY) {
    const { rect, x } = macroCanvasPos(canvasEl, clientX, clientY);
    const pos = clamp01f(x / Math.max(1, rect.width));
    seekMacroToPos(m, pos);
    persistState();
}

function seekMacroFromClientX(m, el, clientX) {
    const rect = el.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const pos = clamp01f(x / Math.max(1, rect.width));
    seekMacroToPos(m, pos);
    persistState();
}

function resetMacroHead(m) {
    seekMacroToPos(m, 0);
}

function beginMacroEdit(m, canvasEl, clientX, clientY, pointerKey) {
    activeMacroEdit = {
        macro: m,
        canvas: canvasEl,
        pointerKey,
        lastIndex: null,
        lastValue: null,
    };
    applyMacroDrawAt(m, canvasEl, clientX, clientY);
}

function moveMacroEdit(m, canvasEl, clientX, clientY, pointerKey) {
    if (!activeMacroEdit || activeMacroEdit.macro !== m || activeMacroEdit.pointerKey !== pointerKey) return;
    applyMacroDrawAt(m, canvasEl, clientX, clientY);
}

function finishMacroEdit(m, pointerKey) {
    if (!activeMacroEdit || activeMacroEdit.macro !== m || activeMacroEdit.pointerKey !== pointerKey) return;
    scheduleMacroCurveSync(m, true);
    persistState();
    activeMacroEdit = null;
}

function wireMacroCanvas(canvasEl, m) {
    let lastTouchTap = null;

    canvasEl.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        seekMacroFromEvent(m, canvasEl, e.clientX, e.clientY);
    });

    canvasEl.addEventListener('dblclick', (e) => {
        e.preventDefault();
        resetMacroHead(m);
    });

    canvasEl.addEventListener('pointerdown', (e) => {
        if (e.button === 2) {
            e.preventDefault();
            seekMacroFromEvent(m, canvasEl, e.clientX, e.clientY);
            return;
        }
        const isPrimaryPress = e.button === 0 || e.pointerType === 'touch' || e.pointerType === 'pen';
        if (!isPrimaryPress) return;
        canvasEl.setPointerCapture(e.pointerId);
        beginMacroEdit(m, canvasEl, e.clientX, e.clientY, `pointer:${e.pointerId}`);
        e.preventDefault();
    });

    canvasEl.addEventListener('pointermove', (e) => {
        moveMacroEdit(m, canvasEl, e.clientX, e.clientY, `pointer:${e.pointerId}`);
        e.preventDefault();
    });

    const finishEdit = (e) => finishMacroEdit(m, `pointer:${e.pointerId}`);
    canvasEl.addEventListener('pointerup', finishEdit);
    canvasEl.addEventListener('pointercancel', finishEdit);

    canvasEl.addEventListener('touchstart', (e) => {
        const touch = e.changedTouches && e.changedTouches[0];
        if (!touch) return;
        beginMacroEdit(m, canvasEl, touch.clientX, touch.clientY, `touch:${touch.identifier}`);
        e.preventDefault();
    }, { passive: false });

    canvasEl.addEventListener('touchmove', (e) => {
        if (!activeMacroEdit || activeMacroEdit.macro !== m || !activeMacroEdit.pointerKey.startsWith('touch:')) return;
        const id = Number(activeMacroEdit.pointerKey.split(':')[1]);
        const touch = Array.from(e.changedTouches || []).find(t => t.identifier === id)
            || Array.from(e.touches || []).find(t => t.identifier === id);
        if (!touch) return;
        moveMacroEdit(m, canvasEl, touch.clientX, touch.clientY, `touch:${id}`);
        e.preventDefault();
    }, { passive: false });

    const finishTouchEdit = (e) => {
        if (!activeMacroEdit || activeMacroEdit.macro !== m || !activeMacroEdit.pointerKey.startsWith('touch:')) return;
        const id = Number(activeMacroEdit.pointerKey.split(':')[1]);
        const touch = Array.from(e.changedTouches || []).find(t => t.identifier === id);
        if (!touch && e.type !== 'touchcancel') return;
        const rect = canvasEl.getBoundingClientRect();
        const tapX = touch ? (touch.clientX - rect.left) : 0;
        const tapY = touch ? (touch.clientY - rect.top) : 0;
        const now = performance.now();
        if (touch) {
            const isDoubleTap = lastTouchTap
                && (now - lastTouchTap.time) < 350
                && Math.hypot(tapX - lastTouchTap.x, tapY - lastTouchTap.y) < 24;
            lastTouchTap = { time: now, x: tapX, y: tapY };
            if (isDoubleTap) {
                finishMacroEdit(m, `touch:${id}`);
                resetMacroHead(m);
                e.preventDefault();
                return;
            }
        }
        finishMacroEdit(m, `touch:${id}`);
        e.preventDefault();
    };
    canvasEl.addEventListener('touchend', finishTouchEdit, { passive: false });
    canvasEl.addEventListener('touchcancel', finishTouchEdit, { passive: false });
}

function wireMacroSeekBar(seekBar, m) {
    let dragPointerId = null;
    let wasPlayingBeforeSeek = false;

    seekBar.addEventListener('contextmenu', (e) => e.preventDefault());

    seekBar.addEventListener('pointerdown', (e) => {
        const isPrimaryPress = e.button === 0 || e.pointerType === 'touch' || e.pointerType === 'pen';
        if (!isPrimaryPress) return;
        dragPointerId = e.pointerId;
        seekBar.setPointerCapture(e.pointerId);
        // Pause playback while seeking
        wasPlayingBeforeSeek = !!m.playing;
        if (m.playing) {
            m.playing = false;
            vscode.postMessage({ type: 'macro-play-toggle', name: m.name, playing: false, loop: m.loop, currentPos: m.currentPos });
            syncMacroRowControls(m);
        }
        seekMacroFromClientX(m, seekBar, e.clientX);
        e.preventDefault();
    });

    seekBar.addEventListener('pointermove', (e) => {
        if (dragPointerId == null || e.pointerId !== dragPointerId) return;
        seekMacroFromClientX(m, seekBar, e.clientX);
        e.preventDefault();
    });

    const stopDrag = (e) => {
        if (dragPointerId == null || e.pointerId !== dragPointerId) return;
        seekMacroFromClientX(m, seekBar, e.clientX);
        dragPointerId = null;
        // Resume playback if it was playing before seek
        if (wasPlayingBeforeSeek) {
            m.playing = true;
            vscode.postMessage({ type: 'macro-play-toggle', name: m.name, playing: true, loop: m.loop, currentPos: m.currentPos });
            syncMacroRowControls(m);
        }
        wasPlayingBeforeSeek = false;
        e.preventDefault();
    };

    seekBar.addEventListener('pointerup', stopDrag);
    seekBar.addEventListener('pointercancel', (e) => {
        if (dragPointerId == null || e.pointerId !== dragPointerId) return;
        dragPointerId = null;
        // Resume on cancel too
        if (wasPlayingBeforeSeek) {
            m.playing = true;
            vscode.postMessage({ type: 'macro-play-toggle', name: m.name, playing: true, loop: m.loop, currentPos: m.currentPos });
            syncMacroRowControls(m);
        }
        wasPlayingBeforeSeek = false;
        e.preventDefault();
    });
}

// ── Restore persisted macro + sequencer state ────────────────────────────
const savedState = getInitialPersistedState();
if (savedState && savedState.macros) {
    savedState.macros.forEach(m => addMacro(m.name, m.points, m.playing, m.durationSec, m.durationBeats, m.currentPos, m.loop, m.macroNum));
    macroNextId = savedState.macroNextId || macros.length + 1;
}
if (savedState && savedState.seqs) {
    savedState.seqs.forEach(s => addSeq(s.name, s.steps, s.playing));
    seqNextId = savedState.seqNextId || seqs.length + 1;
    if (savedState.seqBpm) { seqBpm = savedState.seqBpm; seqBpmInput.value = seqBpm; }
    if (savedState.seqSubdiv) { seqSubdiv = savedState.seqSubdiv; seqSubdivSel.value = seqSubdiv; }
    if (savedState.seqSyncSC != null) { seqSyncSC = savedState.seqSyncSC; }
}
// Ensure default kick/snare/hihat always exist
const defaultSeqs = [
    { name: 'kick',  steps: [1, 0, 0, 0, 1, 0, 0, 0] },
    { name: 'snare', steps: [0, 0, 1, 0, 0, 0, 1, 0] },
    { name: 'hihat', steps: [1, 0, 1, 0, 1, 0, 1, 0] },
];
for (const d of defaultSeqs) {
    if (!seqs.find(s => s.name === d.name)) addSeq(d.name, d.steps);
}
// Reorder so kick/snare/hihat are first, in that order
const defOrder = defaultSeqs.map(d => d.name);
seqs.sort((a, b) => {
    const ai = defOrder.indexOf(a.name);
    const bi = defOrder.indexOf(b.name);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return 0;
});
// Re-render sequencer rows in sorted order
{
    const sg = document.getElementById('seq-grid');
    if (sg) {
        for (const s of seqs) {
            const row = document.getElementById('seq-row-' + s.id);
            if (row) sg.appendChild(row);
        }
    }
}
seqSectionHeight = savedState && savedState.seqSectionHeight != null
    ? savedState.seqSectionHeight
    : defaultSeqSectionHeight();
applySeqSectionHeight(seqSectionHeight, false);
wireLayoutSplitter();
seqSyncCb.checked = seqSyncSC;
seqBpmInput.disabled = seqSyncSC;
seqBpmInput.style.opacity = seqSyncSC ? '0.4' : '1';
updateSeqTapButtonUI();
updateMacroDurationUIs();
if (seqSyncSC) {
    vscode.postMessage({ type: 'seq-tempo-sync' });
}

// ── Collapse/expand ──────────────────────────────────────────────────────
let seqCollapsed = false;
seqHeader.addEventListener('click', () => {
    seqCollapsed = !seqCollapsed;
    seqBody.style.display = seqCollapsed ? 'none' : '';
    seqArrow.textContent = seqCollapsed ? '▸' : '▾';
});

// ── Add sequencer row ────────────────────────────────────────────────────
function addSeq(name, steps, playing) {
    const id = seqNextId++;
    const s = {
        id,
        name: name || 'sq' + id,
        steps: steps || new Array(SEQ_DEFAULT_STEPS).fill(0),
        currentStep: -1,
        color: SEQ_COLORS[(id - 1) % SEQ_COLORS.length],
        playing: playing !== false,
    };
    seqs.push(s);
    renderSeqRow(s);
    updateStatus();
    vscode.postMessage({ type: 'seq-create', name: s.name, steps: s.steps, playing: s.playing });
    return s;
}

function removeSeq(s) {
    seqs = seqs.filter(x => x !== s);
    const row = document.getElementById('seq-row-' + s.id);
    if (row) row.remove();
    vscode.postMessage({ type: 'seq-remove', name: s.name });
    updateStatus();
    persistState();
}

function renderSeqRow(s) {
    const existing = document.getElementById('seq-row-' + s.id);
    const nextSibling = existing ? existing.nextSibling : null;
    if (existing) existing.remove();

    const row = document.createElement('div');
    row.className = 'seq-row';
    row.id = 'seq-row-' + s.id;
    row.dataset.seqId = s.id;

    const playBtn = document.createElement('div');
    playBtn.className = 'seq-play-btn' + (s.playing ? ' playing' : '');
    playBtn.textContent = s.playing ? '⏸' : '▶';
    playBtn.title = s.playing ? 'Pause' : 'Play';
    playBtn.addEventListener('click', () => {
        s.playing = !s.playing;
        playBtn.classList.toggle('playing', s.playing);
        playBtn.textContent = s.playing ? '⏸' : '▶';
        playBtn.title = s.playing ? 'Pause' : 'Play';
        vscode.postMessage({ type: 'seq-play-toggle', name: s.name, playing: s.playing });
        updateSeqStepVisuals();
        persistState();
    });
    row.appendChild(playBtn);

    const label = document.createElement('span');
    label.className = 'seq-label';
    label.textContent = s.name;
    label.title = 'Click to rename';
    label.style.color = s.color;
    label.addEventListener('click', () => {
        const newName = prompt('Rename sequencer:', s.name);
        if (newName && newName.trim()) {
            const old = s.name;
            s.name = newName.trim().replace(/[^a-zA-Z0-9_]/g, '');
            label.textContent = s.name;
            vscode.postMessage({ type: 'seq-rename', oldName: old, newName: s.name });
            persistState();
        }
    });
    row.appendChild(label);

    const subBtn = document.createElement('div');
    subBtn.className = 'seq-len-btn';
    subBtn.textContent = '−';
    subBtn.title = 'Remove last step (' + s.steps.length + ')';
    subBtn.addEventListener('click', () => {
        if (s.steps.length <= 1) return;
        s.steps.pop();
        if (s.currentStep >= s.steps.length) s.currentStep = s.currentStep % s.steps.length;
        vscode.postMessage({ type: 'seq-update-steps', name: s.name, steps: s.steps });
        renderSeqRow(s);
        persistState();
    });
    row.appendChild(subBtn);
