    const addBtn = document.createElement('div');
    addBtn.className = 'seq-len-btn';
    addBtn.textContent = '+';
    addBtn.title = 'Add step (' + s.steps.length + ')';
    addBtn.addEventListener('click', () => {
        s.steps.push(0);
        vscode.postMessage({ type: 'seq-update-steps', name: s.name, steps: s.steps });
        renderSeqRow(s);
        persistState();
    });
    row.appendChild(addBtn);

    s.steps.forEach((val, i) => {
        const btn = document.createElement('div');
        btn.className = 'seq-step' + (val ? ' on' : '');
        btn.dataset.step = i;
        if (val) btn.style.background = s.color;
        btn.addEventListener('click', () => {
            s.steps[i] = s.steps[i] ? 0 : 1;
            btn.classList.toggle('on', !!s.steps[i]);
            btn.style.background = s.steps[i] ? s.color : '';
            vscode.postMessage({ type: 'seq-toggle-step', name: s.name, step: i, val: s.steps[i], steps: s.steps });
            persistState();
        });
        row.appendChild(btn);
    });

    const rm = document.createElement('span');
    rm.className = 'seq-remove';
    rm.textContent = '✕';
    rm.title = 'Remove sequencer (click twice to confirm)';
    let rmPending = false;
    let rmTimer = null;
    rm.addEventListener('click', () => {
        if (rmPending) {
            clearTimeout(rmTimer);
            removeSeq(s);
        } else {
            rmPending = true;
            rm.classList.add('confirm');
            rm.textContent = '✕?';
            rmTimer = setTimeout(() => {
                rmPending = false;
                rm.classList.remove('confirm');
                rm.textContent = '✕';
            }, 2000);
        }
    });
    row.appendChild(rm);

    if (nextSibling) seqGrid.insertBefore(row, nextSibling);
    else seqGrid.appendChild(row);
}

function updateSeqStepVisuals() {
    for (const s of seqs) {
        const row = document.getElementById('seq-row-' + s.id);
        if (!row) continue;
        const stepEls = row.querySelectorAll('.seq-step');
        stepEls.forEach((el, i) => {
            const isCurrent = (i === s.currentStep);
            el.classList.toggle('current', isCurrent && s.playing);
            el.classList.toggle('paused', isCurrent && !s.playing && s.currentStep >= 0);
        });
    }
}

function seqStopAll() {
    macros.forEach(m => {
        m.playing = false;
        m.currentPos = 0;
        m.currentVal = macroSampleAt(m, 0);
        syncMacroRowControls(m);
        drawMacroRow(m);
    });
    seqs.forEach(s => {
        s.playing = false;
        s.currentStep = -1;
    });
    for (const s of seqs) {
        const row = document.getElementById('seq-row-' + s.id);
        if (!row) continue;
        const pb = row.querySelector('.seq-play-btn');
        if (pb) { pb.classList.remove('playing'); pb.textContent = '▶'; pb.title = 'Play'; }
    }
    updateSeqStepVisuals();
    vscode.postMessage({ type: 'seq-stop-all' });
    persistState();
}

seqStopAllBtn.addEventListener('click', seqStopAll);
seqTapBtn.addEventListener('click', registerTapTempo);

seqBpmInput.addEventListener('input', onBpmChange);
seqBpmInput.addEventListener('change', onBpmChange);
function onBpmChange() {
    applyLocalBpm(parseInt(seqBpmInput.value, 10) || 120);
}

seqSubdivSel.addEventListener('change', onSubdivChange);
function onSubdivChange() {
    seqSubdiv = parseInt(seqSubdivSel.value, 10) || 4;
    vscode.postMessage({ type: 'seq-set-bpm', bpm: seqBpm, subdiv: seqSubdiv });
    persistState();
}

seqSyncCb.addEventListener('change', () => {
    seqSyncSC = seqSyncCb.checked;
    seqTapTimes = [];
    seqBpmInput.disabled = seqSyncSC;
    seqBpmInput.style.opacity = seqSyncSC ? '0.4' : '1';
    updateSeqTapButtonUI();
    updateMacroDurationUIs();
    if (seqSyncSC) {
        vscode.postMessage({ type: 'seq-tempo-sync' });
    } else {
        vscode.postMessage({ type: 'seq-tempo-unsync' });
    }
    persistState();
});

document.getElementById('btn-add-macro').addEventListener('click', () => {
    addMacro();
    persistState();
});

document.getElementById('btn-add-seq').addEventListener('click', () => {
    addSeq();
    persistState();
});

// ── Init ─────────────────────────────────────────────────────────────────
resize();
updateStatus();

// Starter knobs — k1 and k2 always get fixed MIDI notes 60/61
const _defaultKnobs = [
    { name: 'k1', id: 1, note: 1, midiNote: MIDI_BASE_NOTE, nx: 0.35, ny: 0.5 },
    { name: 'k2', id: 2, note: 2, midiNote: MIDI_BASE_NOTE + 1, nx: 0.65, ny: 0.5 },
];
for (const dk of _defaultKnobs) {
    if (!knobs.find(k => k.midiNote === dk.midiNote)) {
        const knob = {
            id: dk.id,
            note: dk.note,
            midiNote: dk.midiNote,
            name: dk.name,
            nx: dk.nx,
            ny: dk.ny,
            color: COLORS[(dk.id - 1) % COLORS.length],
            lastSendTime: 0,
        };
        knobs.unshift(knob);
        vscode.postMessage({ type: 'knob-add', id: knob.id, name: knob.name, midiNote: knob.midiNote, x: scX(knob), y: scY(knob) });
    }
}
// Ensure nextId is always above the default IDs
if (nextId <= 2) nextId = 3;

// Starter macros (only if no persisted state)
if (macros.length === 0) {
    addMacro('macro1', createMacroPoints(0.25), true, MACRO_DEFAULT_SECONDS, MACRO_DEFAULT_BEATS, 0, true, 1);
    addMacro('macro2', createMacroPoints(0.75), true, 0.5, 0.5, 0, true, 2);
}

// Starter sequencers (only if no persisted state)
if (seqs.length === 0) {
    //                    steps: 1  2  3  4  5  6  7  8
    addSeq('kick',  [1, 0, 0, 0, 1, 0, 0, 0]);
    addSeq('snare', [0, 0, 1, 0, 0, 0, 1, 0]);
    addSeq('hihat', [1, 0, 1, 0, 1, 0, 1, 0]);
    persistState();
} else if (macros.length > 0) {
    persistState();
}

// ═══════════════════════════════════════════════════════════════════════════
// ── MEDIAPIPE OVERLAY (receives landmark data from extension host) ───────
// ═══════════════════════════════════════════════════════════════════════════
//
// The actual camera capture + MediaPipe Holistic processing runs in a
// separate browser page (served by Express at /mediapipe/capture.html).
// Landmark data flows: capture page → socket.io → extension host → webview.
// This module just draws the overlay and manages the toggle button.
//

(function mediaPipeOverlayModule() {
    'use strict';

    const mpCfg = globalThis.__ENVIL_MP_CONFIG__ || {};
    let mpDrawLandmarks = mpCfg.drawLandmarks !== false;
    let mpActive = false;  // true while capture page is sending landmarks

    // ── DOM refs ──────────────────────────────────────────────────────────
    const overlayCanvas = document.getElementById('mp-overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    const wrap = document.getElementById('canvas-wrap');

    // ── Overlay resize ────────────────────────────────────────────────────
    function resizeOverlay() {
        const dpr = window.devicePixelRatio || 1;
        const w = wrap.clientWidth || 1;
        const h = wrap.clientHeight || 1;
        overlayCanvas.width = w * dpr;
        overlayCanvas.height = h * dpr;
        overlayCanvas.style.width = w + 'px';
        overlayCanvas.style.height = h + 'px';
        overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    new ResizeObserver(() => { if (mpActive) resizeOverlay(); }).observe(wrap);

    // ── Draw helpers ──────────────────────────────────────────────────────
    function dot(x, y, color, radius) {
        const w = wrap.clientWidth || 1;
        const h = wrap.clientHeight || 1;
        overlayCtx.beginPath();
        overlayCtx.arc(x * w, y * h, radius, 0, Math.PI * 2);
        overlayCtx.fillStyle = color;
        overlayCtx.fill();
    }
    function line(x1, y1, x2, y2, color) {
        const w = wrap.clientWidth || 1;
        const h = wrap.clientHeight || 1;
        overlayCtx.beginPath();
        overlayCtx.moveTo(x1 * w, y1 * h);
        overlayCtx.lineTo(x2 * w, y2 * h);
        overlayCtx.strokeStyle = color;
        overlayCtx.lineWidth = 1.5;
        overlayCtx.stroke();
    }
    function clearOverlay() {
        const w = wrap.clientWidth || 1;
        const h = wrap.clientHeight || 1;
        overlayCtx.clearRect(0, 0, w, h);
    }

    // ── Draw landmarks from extracted compact format ──────────────────────
    // Landmarks arrive already in compact form: { pose: { nose: {x,y}, ... }, leftHand, rightHand, face, handOpenness }
    // x/y are normalised 0–1 (already mirrored so left=left from performer perspective)
    function drawLandmarks(lm) {
        clearOverlay();
        if (!mpDrawLandmarks || !lm) return;

        const a = 0.8;

        // ── Pose ──────────────────────────────────────────────────────────
        if (lm.pose) {
            const p = lm.pose;
            // Skeleton connections
            const conns = [
                ['lshldr', 'rshldr'], ['lshldr', 'lelbow'], ['lelbow', 'lwrist'],
                ['rshldr', 'relbow'], ['relbow', 'rwrist'],
                ['lshldr', 'lhip'], ['rshldr', 'rhip'], ['lhip', 'rhip'],
            ];
            const nameMap = {
                nose: p.nose, lwrist: p.leftWrist, rwrist: p.rightWrist,
                lshldr: p.leftShoulder, rshldr: p.rightShoulder,
                lelbow: p.leftElbow, relbow: p.rightElbow,
                lhip: p.leftHip, rhip: p.rightHip,
            };
            for (const [a1, b1] of conns) {
                const pa = nameMap[a1], pb = nameMap[b1];
                if (pa && pb) line(pa.x, pa.y, pb.x, pb.y, `rgba(0,255,170,0.3)`);
            }
            // Key dots
            for (const k of Object.values(nameMap)) {
                if (k) dot(k.x, k.y, `rgba(0,255,170,${a})`, 4);
            }
        }

        // ── Left hand ─────────────────────────────────────────────────────
        if (lm.leftHand) {
            for (const pt of Object.values(lm.leftHand)) {
                if (pt) dot(pt.x, pt.y, `rgba(255,100,100,${a})`, 4);
            }
        }

        // ── Right hand ────────────────────────────────────────────────────
        if (lm.rightHand) {
            for (const pt of Object.values(lm.rightHand)) {
                if (pt) dot(pt.x, pt.y, `rgba(100,100,255,${a})`, 4);
            }
        }

        // ── Face key points ───────────────────────────────────────────────
        if (lm.face) {
            for (const pt of Object.values(lm.face)) {
                if (pt) dot(pt.x, pt.y, `rgba(255,220,80,0.7)`, 3);
            }
        }
    }

    // ── Global handler called from message listener ───────────────────────
    globalThis.mpDrawOverlay = function(landmarks) {
        if (!mpActive) {
            mpActive = true;
            overlayCanvas.style.display = 'block';
            resizeOverlay();
            updateMpButton();
        }
        drawLandmarks(landmarks);
    };

    // ── Config updater (settings changed) ─────────────────────────────────
    globalThis.mpApplyConfig = function(cfg) {
        if (cfg.drawLandmarks != null) mpDrawLandmarks = cfg.drawLandmarks;
    };

    // ── Toolbar toggle button ─────────────────────────────────────────────
    const mpToggleBtn = document.getElementById('btn-mp-toggle');
    function updateMpButton() {
        mpToggleBtn.classList.toggle('mp-active', mpActive);
        mpToggleBtn.textContent = mpActive ? '📷 Body ✓' : '📷 Body';
    }
    updateMpButton();

    mpToggleBtn.addEventListener('click', () => {
        // Open the capture page in the user's browser
        vscode.postMessage({ type: 'mediapipe-open-capture' });
    });

    // ── Auto-hide overlay after 3s without data ───────────────────────────
    let _hideTimeout = null;
    const origDraw = globalThis.mpDrawOverlay;
    globalThis.mpDrawOverlay = function(landmarks) {
        clearTimeout(_hideTimeout);
        _hideTimeout = setTimeout(() => {
            mpActive = false;
            overlayCanvas.style.display = 'none';
            clearOverlay();
            updateMpButton();
        }, 3000);
        origDraw(landmarks);
    };
})();
</script>
