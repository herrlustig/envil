<!DOCTYPE html>
<html lang="en">
<head>
    <title>ENVIL</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="./style.css" />

    <!-- import hydra synth (local bundle for offline use) -->
    <script src="./lib/hydra-synth.min.js"></script>
    <script src="./global-hydra.js" defer></script>
    <script src="./knob-proxy.js" defer></script>
    <script src="./sc-proxy.js" defer></script>
    <script src="./seq-proxy.js" defer></script>
    <script src="./peek-overlay.js" defer></script>
    <script src="./hydra-startup-script.js" defer></script>

</head>

<body>
    <canvas id="main-hydra-canvas"></canvas>
    <script src="./lib/socket.io.min.js"></script>
    <script>
        const socket = io("http://localhost:3001");

        // ── Global error handlers — catch errors that escape try/catch ────────
        // e.g. errors inside Hydra arrow-function callbacks during animation
        window.onerror = function (message, source, lineno, colno, error) {
            const detail = error ? error.toString() : message;
            console.error('[Hydra runtime error]', detail);
            socket.emit('runtime-error', {
                data: detail,
                source: source || '',
                line: lineno || 0,
                col: colno || 0
            });
            return true; // prevent default browser error overlay
        };

        window.addEventListener('unhandledrejection', function (event) {
            const detail = event.reason ? event.reason.toString() : 'Unhandled promise rejection';
            console.error('[Hydra async error]', detail);
            socket.emit('runtime-error', {
                data: detail,
                source: 'promise',
                line: 0,
                col: 0
            });
        });

        // ── Peek monitor handler ─────────────────────────────────────────────
        socket.on('monitor-expressions', function (msg) {
            if (typeof peekSet === 'function') {
                peekSet(msg.expressions || []);
                peekShow();
            }
        });

        socket.on('peek-toggle', function () {
            if (typeof peekToggle === 'function') peekToggle();
        });

        socket.on('peek-clear', function () {
            if (typeof peekClear === 'function') peekClear();
        });

        // ── Knob proxy handlers ──────────────────────────────────────────────
        // Update v.c<num>.x / .y from touch-knob movements
        socket.on('knob-update', function (msg) {
            if (typeof _vKnobUpdate === 'function') {
                _vKnobUpdate(msg.note, msg.x, msg.y);
            }
        });

        // Note on — v.n<num>.val = val, v.n.val = num, v.n_val.val = val
        socket.on('knob-note', function (msg) {
            if (typeof _vKnobNoteOn === 'function') {
                _vKnobNoteOn(msg.note, msg.val);
            }
        });

        // Note off — v.n<num>.val = 0, v.n_val.val = 0
        socket.on('knob-note-off', function (msg) {
            if (typeof _vKnobNoteOff === 'function') {
                _vKnobNoteOff(msg.note);
            }
        });

        // ── SC proxy bridge ────────────────────────────────────────────────
        // Update sc.<name> from scsynth bus polling
        socket.on('sc-proxy-update', function (msg) {
            if (typeof _scProxyUpdate === 'function') {
                _scProxyUpdate(msg.name, msg.values);
            }
        });

        // ── Sequencer proxy ───────────────────────────────────────────────
        // Update seq.<name> from sequencer step changes
        socket.on('seq-step', function (msg) {
            if (typeof _seqStepUpdate === 'function') {
                _seqStepUpdate(msg.name, msg.step, msg.val, msg.steps);
            }
        });

        // ── Eval handler ─────────────────────────────────────────────────────
        let _lastEvalCode = '';  // keep track for runtime-error context

        socket.on('new-command', function (msg) {
            console.log(msg.data);
            _lastEvalCode = msg.data;
            try {
                eval(msg.data);
                socket.emit('eval-result', { data: 'OK — ' + msg.data.slice(0, 80) });
            } catch (e) {
                console.error('[Hydra eval error]', e);
                socket.emit('eval-error', {
                    data: e.toString(),
                    code: msg.data.slice(0, 120)
                });
            }
        });
    </script>
</body>
</html>
